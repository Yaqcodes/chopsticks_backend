components:
  schemas:
    ActivePromotions:
      type: object
      description: Serializer for active promotional codes.
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 20
        description:
          type: string
        discount_type:
          $ref: '#/components/schemas/DiscountTypeEnum'
        discount_type_display:
          type: string
          readOnly: true
        discount_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        minimum_order_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        maximum_discount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        valid_until:
          type: string
          format: date-time
          nullable: true
      required:
      - code
      - description
      - discount_type
      - discount_type_display
      - discount_value
      - id
    Address:
      type: object
      description: Serializer for address CRUD operations.
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          maxLength: 200
        phone:
          type: string
          maxLength: 15
        address:
          type: string
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        postal_code:
          type: string
          nullable: true
        country:
          type: string
          maxLength: 100
        latitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        longitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        is_default:
          type: boolean
        address_type:
          $ref: '#/components/schemas/AddressTypeEnum'
        full_address:
          type: string
          readOnly: true
        coordinates:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - address
      - city
      - coordinates
      - created_at
      - full_address
      - full_name
      - id
      - phone
      - state
      - updated_at
    AddressCreate:
      type: object
      description: Serializer for creating new addresses.
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          maxLength: 200
        phone:
          type: string
          maxLength: 15
        address:
          type: string
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        postal_code:
          type: string
          nullable: true
        country:
          type: string
          maxLength: 100
        latitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        longitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        is_default:
          type: boolean
        address_type:
          $ref: '#/components/schemas/AddressTypeEnum'
        full_address:
          type: string
          readOnly: true
        coordinates:
          type: string
          readOnly: true
      required:
      - address
      - city
      - coordinates
      - full_address
      - full_name
      - id
      - phone
      - state
    AddressTypeEnum:
      enum:
      - home
      - work
      - other
      type: string
      description: |-
        * `home` - Home
        * `work` - Work
        * `other` - Other
    AddressUpdate:
      type: object
      description: Serializer for updating addresses.
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          maxLength: 200
        phone:
          type: string
          maxLength: 15
        address:
          type: string
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        postal_code:
          type: string
          nullable: true
        country:
          type: string
          maxLength: 100
        latitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        longitude:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        is_default:
          type: boolean
        address_type:
          $ref: '#/components/schemas/AddressTypeEnum'
        full_address:

[build]
# Nixpacks auto-detects requirements.txt + runtime.txt + Procfile.
builder = "NIXPACKS"

[deploy]
# Migrations run here (private network) before the web container and healthcheck start.
# Do not run migrate in the web/start command — fresh DB migrations can exceed the healthcheck window.
preDeployCommand = "python manage.py migrate --noinput"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/healthz/"
healthcheckTimeout = 30
